  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"57ac25c8-6d5c-49c1-b587-5904da09a49f\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root,\n:root[data-theme=\"negro-azul\"],\n:root[data-theme=\"negro-naranja\"]{\n  --bg:#0E1117;            /* negro frío */\n  --panel:#161B23;\n  --panel-2:#1D232D;\n  --paper:#EEF1F6;\n  --fg:#EEF1F6;\n  --fg-soft:#99A2B0;\n  --fg-faint:#6C7585;\n  --line:rgba(238,241,246,.13);\n  --line-2:rgba(238,241,246,.07);\n  --accent:#3B74F2;        /* azul — acento único */\n  --accent-2:#6E97F6;\n  --on-accent:#0E1117;\n  --accent-name:\"Azul\";\n}\n\n:root{\n  --display:'Schibsted Grotesk',system-ui,sans-serif;\n  --body:'Schibsted Grotesk',system-ui,sans-serif;\n  --mono:'Space Mono',ui-monospace,monospace;\n  --maxw:1200px; --gut:clamp(20px,5vw,60px);\n  --radius:14px;\n}\n\n/* ── Ajustes del sistema (v1.1) · aditivos, no alteran bloques existentes ── */\n:root{\n  /* Datos en AZUL ÚNICO (R1) — series y estados sin semáforo verde/rojo */\n  --data-1:#3B74F2;   /* azul base · serie principal */\n  --data-2:#6E97F6;   /* azul claro */\n  --data-3:#9DB8F9;\n  --data-4:#2A5DD0;   /* azul profundo */\n  --data-5:#C4D5FC;   /* azul tenue */\n  --data-strong:#3B74F2;         /* dato protagonista / al alza */\n  --data-mute:#6C7585;           /* dato secundario / a la baja — slate, no rojo */\n  --data-grid:rgba(238,241,246,.08);\n\n  /* Registro AUDAZ (R4) — escala display grande para contundencia */\n  --fs-mega:clamp(72px,13vw,190px);\n  --fs-audaz:clamp(44px,7vw,96px);\n  --tracking-mega:-.045em;\n\n  /* Mitad CÁLIDA (R3) — superficie editorial tibia + itálica de voz.\n     Uso puntual (citas, testimonios, pie de foto); nunca como fondo de área grande. */\n  --paper-calido:#F3EFE9;\n  --ink-calido:#2A2622;\n}\n.audaz{font-family:var(--display);font-weight:800;font-size:var(--fs-audaz);letter-spacing:var(--tracking-mega);line-height:.98}\n.mega{font-family:var(--display);font-weight:900;font-size:var(--fs-mega);letter-spacing:var(--tracking-mega);line-height:.9}\n.calido{font-style:italic;font-weight:400}\n*{box-sizing:border-box}\nhtml{scroll-behavior:smooth}\nbody{margin:0;font-family:var(--body);color:var(--fg);background:var(--bg);\n  font-size:17px;line-height:1.6;-webkit-font-smoothing:antialiased;\n  transition:background .45s ease,color .45s ease}\n.wrap{max-width:var(--maxw);margin:0 auto;padding-inline:var(--gut)}\nimg{max-width:100%;display:block}\n::selection{background:var(--accent);color:var(--on-accent)}\n\nh1,h2,h3{font-family:var(--display);font-weight:700;letter-spacing:-.025em;color:var(--fg);margin:0;line-height:1.05}\nh1{font-weight:800;font-size:clamp(34px,5vw,58px);letter-spacing:-.035em}\nh2{font-size:clamp(24px,3vw,34px);font-weight:700}\nh3{font-size:20px;font-weight:600}\np{text-wrap:pretty}\n\n/* page header */\n.top{padding:60px 0 36px;border-bottom:1px solid var(--line)}\n.eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.16em;text-transform:uppercase;\n  color:var(--accent);display:inline-flex;align-items:center;gap:11px}\n.eyebrow::before{content:\"\";width:24px;height:2px;background:var(--accent)}\n.top h1{margin:18px 0 0}\n.sub{color:var(--fg-soft);font-size:clamp(17px,2vw,21px);max-width:62ch;margin:18px 0 0}\n\n/* sello · validado y cerrado */\n.seal{display:inline-flex;align-items:center;gap:10px;width:max-content;\n  background:var(--fg);border-radius:999px;padding:6px 16px 6px 6px;\n  box-shadow:0 6px 20px -8px rgba(0,0,0,.5)}\n.seal .chk{width:28px;height:28px;border-radius:50%;background:#16A862;\n  display:grid;place-items:center;flex:none}\n.seal .chk svg{width:15px;height:15px;display:block}\n.seal .tx{display:flex;flex-direction:column;gap:1px;line-height:1.12;text-align:left}\n.seal .tx b{font-family:var(--display);font-size:12.5px;font-weight:700;\n  letter-spacing:.05em;text-transform:uppercase;color:var(--bg)}\n.seal .tx i{font-family:var(--mono);font-size:9.5px;font-style:normal;\n  letter-spacing:.03em;color:#6E7480}\n.top .seal{margin:0}\n.seal--fixed{position:absolute;top:18px;right:18px;bottom:auto;z-index:200;margin:0}\n@media print{.seal--fixed{position:absolute}}\n\n/* sections */\nsection{padding:54px 0;border-bottom:1px solid var(--line)}\nsection:last-of-type{border-bottom:none}\n.lead{font-family:var(--mono);font-size:11.5px;letter-spacing:.16em;text-transform:uppercase;\n  color:var(--fg-faint);margin:0 0 8px;display:flex;align-items:center;gap:10px}\n.lead b{color:var(--accent);font-weight:400}\n.sec-intro{color:var(--fg-soft);font-size:15.5px;max-width:72ch;margin:10px 0 28px}\n\n/* grid helpers */\n.grid{display:grid;gap:16px}\n.c2{grid-template-columns:repeat(2,1fr)}.c3{grid-template-columns:repeat(3,1fr)}\n.c4{grid-template-columns:repeat(4,1fr)}.c5{grid-template-columns:repeat(5,1fr)}\n@media(max-width:900px){.c4,.c5{grid-template-columns:repeat(2,1fr)}.c3{grid-template-columns:1fr}}\n@media(max-width:560px){.c2,.c4,.c5{grid-template-columns:1fr}}\n\n/* logo tiles */\n.tile{border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;\n  display:flex;flex-direction:column;background:var(--panel)}\n.stage{flex:1;display:grid;place-items:center;padding:32px;min-height:160px}\n.stage.light{background:var(--paper)}\n.stage.dark{background:#0B0A08}\n.stage.accent{background:var(--accent)}\n.stage svg,.stage img{max-width:100%;max-height:100%}\n.cap{border-top:1px solid var(--line);padding:12px 16px;display:flex;\n  justify-content:space-between;align-items:center;gap:8px;background:var(--panel)}\n.cap b{font-family:var(--display);font-weight:600;font-size:13px;color:var(--fg)}\n.cap span{font-family:var(--mono);font-size:10px;color:var(--fg-faint);text-transform:uppercase;letter-spacing:.08em}\n\n/* note / files */\n.note{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);\n  padding:24px 28px;font-size:14.5px;color:var(--fg-soft);line-height:1.7}\n.note b{color:var(--fg)}\n.files{font-family:var(--mono);font-size:12px;color:var(--fg-soft);line-height:2;margin-top:10px}\n.files i{color:var(--accent);font-style:normal}\n.mono{font-family:var(--mono)}\n\n/* download buttons */\n.dl{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;\n  letter-spacing:.06em;text-transform:uppercase;color:var(--fg);text-decoration:none;\n  border:1px solid var(--line);border-radius:999px;padding:7px 14px;transition:all .2s ease;cursor:pointer}\n.dl:hover{border-color:var(--accent);color:var(--accent)}\n.dl svg{width:13px;height:13px}\n<\u002Fstyle>\n<style>\n  body{background:var(--bg);color:var(--fg);margin:0;font-family:var(--display),system-ui,sans-serif;line-height:1.62}\n  a{color:var(--accent)}a:hover{color:var(--accent-2,#6E9BFF)}\n  .doc{max-width:820px;margin:0 auto;padding:0 40px}\n  @media(max-width:600px){.doc{padding:0 20px}}\n  .mono{font-family:var(--mono)}\n  .backbar{display:flex;gap:12px;flex-wrap:wrap;padding:22px 0 0}\n  .backbar a{font-family:var(--mono);font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:var(--fg-faint);border:1px solid var(--line);border-radius:999px;padding:8px 14px;text-decoration:none}\n  .backbar a:hover{border-color:var(--accent);color:var(--accent)}\n  .head{padding:32px 0 28px;border-bottom:1px solid var(--line-2)}\n  .kick{font-family:var(--mono);font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent)}\n  .head h1{font-family:var(--display);font-weight:800;letter-spacing:-.03em;line-height:1.05;font-size:clamp(30px,4.5vw,44px);margin:12px 0 0}\n  .head .upd{font-family:var(--mono);font-size:11.5px;color:var(--fg-faint);margin-top:14px}\n  .ph{background:rgba(240,198,116,.14);color:#F0C674;border-radius:4px;padding:1px 6px;font-family:var(--mono);font-size:.92em}\n  h2{font-family:var(--display);font-weight:700;font-size:20px;letter-spacing:-.01em;margin:38px 0 10px;padding-top:10px}\n  h3{font-family:var(--display);font-weight:700;font-size:15.5px;margin:22px 0 6px}\n  p,li{font-size:15px;color:var(--fg-soft)}\n  p{margin:10px 0}\n  p b,li b{color:var(--fg)}\n  ul{margin:10px 0;padding-left:20px}\n  li{margin:6px 0}\n  .simpl{border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:12px;background:var(--panel);padding:20px 22px;margin:22px 0}\n  .simpl .ct{font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);margin-bottom:8px}\n  .simpl p{margin:6px 0}\n  .anchor{scroll-margin-top:20px;border:1px solid rgba(59,116,242,.35);border-radius:12px;background:radial-gradient(130% 130% at 80% 0%,rgba(59,116,242,.08),transparent);padding:4px 22px 20px;margin-top:28px}\n  .warn{border:1px solid rgba(240,198,116,.4);border-left:3px solid #F0C674;border-radius:11px;background:rgba(240,198,116,.06);padding:14px 16px;margin:26px 0}\n  .warn p{margin:0;font-size:13.5px;color:var(--fg-soft)}\n  .warn b{color:var(--fg)}\n  .foot{padding:34px 0 90px;display:flex;gap:16px;flex-wrap:wrap;font-family:var(--mono);font-size:12px}\n  .foot a{text-decoration:none;border:1px solid var(--line);border-radius:999px;padding:10px 16px;color:var(--fg)}\n  .foot a:hover{border-color:var(--accent)}\n<\u002Fstyle>\n<\u002Fhead>\n<body data-screen-label=\"Aviso de Privacidad\">\n<div class=\"doc\">\n  <div class=\"backbar\">\n    <a href=\"Centro Legal.html\">← Centro Legal<\u002Fa>\n    <a href=\"#arco\">Derechos ARCO<\u002Fa>\n  <\u002Fdiv>\n\n  <header class=\"head\">\n    <div class=\"kick\">Protección de datos · LFPDPPP 2025<\u002Fdiv>\n    <h1>Aviso de Privacidad<\u002Fh1>\n    <div class=\"upd\">Última actualización: 12 de julio de 2026 · Borrador por validar con abogado<\u002Fdiv>\n  <\u002Fheader>\n\n  <div class=\"simpl\">\n    <div class=\"ct\">Aviso simplificado (para la web / formularios)<\u002Fdiv>\n    <p><b>Don Ventas<\u002Fb>, responsable del tratamiento de tus datos personales, los usará para: contactarte, atender tu solicitud de la lista de espera y prestarte nuestros servicios de branding. De forma voluntaria (con tu consentimiento) también para enviarte información y campañas. Puedes limitar estos usos y ejercer tus <b>Derechos ARCO<\u002Fb> escribiendo a <a href=\"mailto:arturo.villagomez@donventas.mx\">arturo.villagomez@donventas.mx<\u002Fa>. Consulta el aviso integral completo en <a href=\"https://donventas.mx/aviso-de-privacidad\">donventas.mx/aviso-de-privacidad<\u002Fa>.<\u002Fp>\n  <\u002Fdiv>\n\n  <h2>1. Responsable de tus datos<\u002Fh2>\n  <p><b>Don Ventas<\u002Fb> (marca operada por Arturo Villagómez Gómez, persona física con actividad empresarial), con domicilio en Carlos Pereyra 66, Viaducto Piedad, C.P. 08200, Iztacalco, Ciudad de México, es responsable del uso y protección de tus datos personales, conforme a la Ley Federal de Protección de Datos Personales en Posesión de los Particulares (LFPDPPP, vigente desde el 21 de marzo de 2025) y demás normativa aplicable.<\u002Fp>\n  <p>Contacto en materia de datos personales: <a href=\"mailto:arturo.villagomez@donventas.mx\">arturo.villagomez@donventas.mx<\u002Fa>.<\u002Fp>\n\n  <h2>2. Datos personales que recabamos<\u002Fh2>\n  <p>Podemos recabar, de forma directa cuando los proporcionas:<\u002Fp>\n  <ul>\n    <li><b>De identificación y contacto:<\u002Fb> nombre, correo electrónico, teléfono/WhatsApp.<\u002Fli>\n    <li><b>De tu negocio:<\u002Fb> nombre del negocio, giro, ubicación y el reto de marca que nos describes.<\u002Fli>\n    <li><b>De la relación comercial (si te vuelves cliente):<\u002Fb> datos de facturación y de los proyectos en el portal.<\u002Fli>\n  <\u002Ful>\n  <p><b>No recabamos datos personales sensibles.<\u002Fb> No solicitamos información sobre origen racial, salud, creencias, preferencias u otros datos de esa naturaleza.<\u002Fp>\n\n  <h2>3. Finalidades del tratamiento<\u002Fh2>\n  <h3>Finalidades necesarias (no requieren consentimiento adicional)<\u002Fh3>\n  <ul>\n    <li>Atender tu registro en la lista de espera y avisarte cuando haya cupo.<\u002Fli>\n    <li>Contactarte, agendar tu diagnóstico y prestarte nuestros servicios.<\u002Fli>\n    <li>Gestionar el proyecto, la facturación y el acceso al portal.<\u002Fli>\n  <\u002Ful>\n  <h3>Finalidades no necesarias (requieren tu consentimiento y puedes negarlas)<\u002Fh3>\n  <ul>\n    <li>Enviarte contenido, novedades y campañas de marketing.<\u002Fli>\n    <li>Elaborar estadísticas y mejorar nuestra oferta.<\u002Fli>\n  <\u002Ful>\n  <p>Si no deseas que tus datos se usen para las finalidades no necesarias, puedes indicarlo al registrarte o escribir a <a href=\"mailto:arturo.villagomez@donventas.mx\">arturo.villagomez@donventas.mx<\u002Fa>. Tu negativa no afectará la prestación del servicio.<\u002Fp>\n\n  <h2>4. Medios para limitar el uso o divulgación<\u002Fh2>\n  <p>Puedes solicitar limitar el uso o divulgación de tus datos escribiendo a <a href=\"mailto:arturo.villagomez@donventas.mx\">arturo.villagomez@donventas.mx<\u002Fa>. También puedes darte de baja de nuestras comunicaciones en cualquier momento desde el enlace incluido en cada correo.<\u002Fp>\n\n  <h2>5. Transferencias y encargados<\u002Fh2>\n  <p>Para operar, tus datos pueden ser tratados por proveedores tecnológicos que actúan como <b>encargados<\u002Fb> bajo nuestras instrucciones y con obligaciones de confidencialidad: servicios de base de datos y hospedaje (p. ej. Supabase, Vercel), procesamiento de pagos (p. ej. Stripe) y correo/ofimática (p. ej. Google Workspace). No vendemos ni transferimos tus datos a terceros con fines distintos a los aquí descritos sin tu consentimiento, salvo en los supuestos que la ley permite.<\u002Fp>\n\n  <div class=\"anchor\" id=\"arco\">\n    <h2>6. Tus Derechos ARCO y cómo ejercerlos<\u002Fh2>\n    <p>Tienes derecho a <b>Acceder<\u002Fb> a tus datos, <b>Rectificarlos<\u002Fb> cuando sean inexactos o estén desactualizados, <b>Cancelarlos<\u002Fb> cuando consideres que no se requieren, y <b>Oponerte<\u002Fb> a su tratamiento. También puedes revocar tu consentimiento.<\u002Fp>\n    <h3>Cómo ejercerlos<\u002Fh3>\n    <ul>\n      <li>Envía tu solicitud a <a href=\"mailto:arturo.villagomez@donventas.mx\">arturo.villagomez@donventas.mx<\u002Fa> indicando: tu nombre, un medio para responderte, la descripción clara de los datos y el derecho que quieres ejercer, y un documento que acredite tu identidad.<\u002Fli>\n      <li>Responderemos tu solicitud en un plazo máximo de <b>20 días hábiles<\u002Fb>; de proceder, se hará efectiva dentro de los <b>15 días hábiles<\u002Fb> siguientes.<\u002Fli>\n      <li>El ejercicio de estos derechos es <b>gratuito<\u002Fb>; solo se cubrirían, en su caso, gastos de envío o reproducción.<\u002Fli>\n    <\u002Ful>\n  <\u002Fdiv>\n\n  <h2>7. Uso de cookies<\u002Fh2>\n  <p>Nuestro sitio usa cookies y tecnologías similares. Consulta nuestra <a href=\"Politica de Cookies.html\">Política de Cookies<\u002Fa> para conocer cuáles usamos y cómo gestionarlas.<\u002Fp>\n\n  <h2>8. Cambios al aviso de privacidad<\u002Fh2>\n  <p>Podemos actualizar este aviso. Publicaremos la versión vigente en <a href=\"https://donventas.mx/aviso-de-privacidad\">donventas.mx/aviso-de-privacidad<\u002Fa> con su fecha de actualización. Si hay cambios sustanciales en las finalidades, te lo comunicaremos por el medio de contacto que nos hayas proporcionado.<\u002Fp>\n\n  <h2>9. Autoridad<\u002Fh2>\n  <p>La vigilancia del cumplimiento de la LFPDPPP corresponde a la <b>Secretaría Anticorrupción y Buen Gobierno<\u002Fb> (que asumió las funciones del extinto INAI). Si consideras que tu derecho a la protección de datos ha sido vulnerado, puedes acudir ante dicha autoridad.<\u002Fp>\n\n  <div class=\"warn\"><p><b>Borrador base — no es asesoría legal.<\u002Fb> Completa los campos marc
